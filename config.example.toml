# wiki-brain configuration — copy this file to `config.toml` and edit.
#
#   cp config.example.toml config.toml      # (PowerShell: Copy-Item)
#
# `config.toml` is git-ignored so your machine-specific paths never get
# committed. The live DB lives at an ABSOLUTE path OUTSIDE the working tree
# (BUILD_SPEC.md §2) so scheduled-task worktrees all share one source of truth.

[paths]
# Where the live SQLite DB lives. `~` expands to your home dir. If you run the
# brain from scheduled tasks under a different OS account, pin this to an
# absolute path instead (e.g. "D:/wiki-brain/wiki.db") so it can't drift when
# `~` resolves differently across accounts.
db = "~/.wiki-brain/wiki.db"

# Browser bookmark files to sync (Chrome "Bookmarks" JSON or Firefox places.sqlite).
bookmarks = ["~/AppData/Local/Google/Chrome/User Data/Default/Bookmarks"]
bookmark_folder = "wiki"        # only sync bookmarks under this browser folder

# Optional: a folder you drop files into (PDF/DOCX/images/…) for `wiki drop`
# to ingest. Created on first use.
drop_folder = "~/wiki-brain-drop"

[gate]
auto_promote_confidence = 0.85  # claims at/above this may auto-promote
machine_confidence_ceiling = 0.9  # cap on machine-origin claim confidence

[budgets]
queries_per_question = 4
fetches_per_question = 5
questions_per_night = 8
fetches_per_night = 40

[search]
engine = "ddg"                  # "ddg" (no key) or "searxng" (self-hosted)
searxng_url = "http://localhost:8888"
fetch_backend = "jina"          # "jina" (r.jina.ai, no key, renders JS) or "trafilatura"
jina_base = "https://r.jina.ai/"

[lint]
stale_days = 30
contradiction_days = 14

[extract]
# For `wiki drop` of PDFs/images (needs the optional [docs] extra).
ocr = true                 # allow Tesseract OCR for flat images
tesseract_cmd = ""         # path to tesseract.exe on Windows, or "" to use PATH
docling_ocr = true         # let Docling OCR scanned PDFs
whisper_model = "base"     # local ASR model size (only if the [whisper] extra is installed)

[embed]
# Local-embedding semantic search (needs the optional [semantic] extra: torch).
model = "sentence-transformers/all-MiniLM-L6-v2"
enabled = false

[mcp]
# Expose the brain over MCP so any client (Claude Desktop, other harnesses) can
# query it (needs the optional [mcp] extra). `wiki mcp info` prints the client
# config snippet; `wiki mcp serve` runs the stdio server. No API key, no model
# call — the server only wraps the read tools, plus the gated capture write.
read_only = false          # true: serve read-only (omit the brain_capture write tool)
recall_k = 8               # default top-k claims returned by brain_recall

[librarian]
# The librarian is the model-BEARING half — the `wiki-librarian` console script,
# a SEPARATE process from `wiki` (which still makes zero model calls). It performs
# the extraction judgment a Claude Code session would, using whatever model you
# point it at. It never promotes: everything it files is pending, behind the same
# human gate. Leave this table out entirely and nothing changes — extraction just
# happens in interactive sessions as before.
#
# Trigger model: EVENT-DRIVEN, not scheduled. With auto_extract on, each `wiki
# add/drop/capture/transcribe` fires a detached `wiki-librarian extract` for the
# new source, so a clip is extracted seconds after it lands — no cron, no Task
# Scheduler, no Desktop Routines. `wiki-librarian catch-up` drains any backlog
# (machine was off, model was down); run it by hand, or from a timer if you like
# belt-and-suspenders. If the librarian is unreachable, sources just stay 'new'.
auto_extract = false

# Any OpenAI-compatible /v1 endpoint. Local + key-free options keep the project's
# original posture: Ollama ("http://localhost:11434/v1") or LM Studio
# ("http://localhost:1234/v1"). Hosted options (OpenRouter, DeepSeek, OpenAI,
# Anthropic's compat endpoint) also work — set api_key_env for those.
base_url = "http://localhost:11434/v1"

# The API key is NEVER stored here (that would trip `wiki lint`'s secret scan).
# Give the NAME of an environment variable that holds it; "" means no key (local).
api_key_env = ""                 # e.g. "OPENROUTER_API_KEY"

# Default model for every task. Per-task overrides go under [librarian.models]:
# cheap/local for the high-volume extraction + triage, a stronger model for
# adjudication and synthesis. Any task without an override uses this default.
model = "qwen3:14b"

# [librarian.models]
# extract    = "qwen3:14b"                  # high volume — keep it cheap/local
# triage     = "qwen3:14b"                  # per-claim promote/reject/hold recommendation
# adjudicate = "claude-sonnet-5"            # contradictions/escalations — lowest volume, hardest
# synthesize = "claude-sonnet-5"            # page prose + skill drafts

# --- Example: a REMOTE OpenAI-compatible GATEWAY (llama-swap / LiteLLM /
# fleet-router on another machine) fronting several GGUF models, with per-task
# routing. The librarian treats it exactly like a hosted API: point base_url at
# the box's address (NOT 127.0.0.1 — the gateway must be bound/exposed on the LAN,
# behind a firewall or reverse proxy) and authenticate with a token via
# api_key_env. Reasoning models (e.g. Ornith) need generous max_tokens (below) and
# emit a <think> preamble the librarian strips automatically.
# base_url    = "http://inferencebox.lan:4000/v1"   # a remote LiteLLM gateway
# api_key_env = "INFERENCEBOX_TOKEN"                # LiteLLM master key, from the env
# [librarian.models]
# extract    = "qwen2.5-coder-14b"          # reliable structured-JSON extraction
# triage     = "ornith-1.0-9b"              # fast per-claim reasoning
# adjudicate = "ornith-1.0-35b"             # hardest judgement, lowest volume
# synthesize = "ornith-1.0-35b"             # prose + skill drafts
# (Or point base_url at a router and set model = "auto" to let it classify.)

max_source_chars = 24000         # truncate raw source text sent to the model
timeout = 180                    # seconds per model call
temperature = 0.2
retries = 1                      # re-ask attempts when output fails the contract
network_retries = 2              # transient (connection/5xx) retries w/ backoff
# Output token cap per call (sent as max_tokens; 0 omits it). Reasoning models
# spend tokens thinking before the JSON, so keep this >= ~2048 for them.
max_tokens = 4096
