# wiki-brain configuration — copy this file to `config.toml` and edit.
#
#   cp config.example.toml config.toml      # (PowerShell: Copy-Item)
#
# `config.toml` is git-ignored so your machine-specific paths never get
# committed. The live DB lives at an ABSOLUTE path OUTSIDE the working tree
# (BUILD_SPEC.md §2) so scheduled-task worktrees all share one source of truth.

[paths]
# Where the live SQLite DB lives. `~` expands to your home dir. If you run the
# brain from scheduled tasks under a different OS account, pin this to an
# absolute path instead (e.g. "D:/wiki-brain/wiki.db") so it can't drift when
# `~` resolves differently across accounts.
#
# The `WIKIBRAIN_DB` env var overrides this. Use it to point tests, scripts and
# MCP verification at a scratch database — opening a repo runs forward migrations
# on the DB this resolves to, and a temp repo root does NOT isolate it.
# See docs/MIGRATIONS.md.
db = "~/.wiki-brain/wiki.db"

# Browser bookmark files to sync (Chrome "Bookmarks" JSON or Firefox places.sqlite).
bookmarks = ["~/AppData/Local/Google/Chrome/User Data/Default/Bookmarks"]
bookmark_folder = "wiki"        # only sync bookmarks under this browser folder

# Optional: a folder you drop files into (PDF/DOCX/images/…) for `wiki drop`
# to ingest. Created on first use.
drop_folder = "~/wiki-brain-drop"

# Additional ingestion folders. Each [[paths.sources]] is a folder that `wiki
# drop` and the librarian's `watch` loop pull files from — so info flows in from
# wherever it already lives, not just one dedicated inbox. `path` is required;
# everything else has a safe default. Files are NEVER moved by default
# (move = false): global content-hash dedup makes re-scanning the same folder
# harmless, so it's safe to point at real directories you also use elsewhere.
# The `drop_folder` above behaves as an implicit source with move = true,
# origin = "drop", recursive = false.
#
# [[paths.sources]]
# path      = "~/Documents/papers"
# origin    = "papers"     # provenance tag on each ingested source (default "drop").
#                          # AVOID the reserved tags clip / transcript / session/* /
#                          # autoresearch — they carry special downstream meaning.
# recursive = true         # descend into subfolders (default false)
# include   = ["*.pdf"]    # only files matching these globs (default: all files)
# move      = false        # true = archive originals to <folder>/.processed/ after ingest
#
# [[paths.sources]]
# path    = "~/notes"
# origin  = "notes"
# include = ["*.md", "*.txt"]

[gate]
auto_promote_confidence = 0.85  # claims at/above this may auto-promote
machine_confidence_ceiling = 0.9  # cap on machine-origin claim confidence

[budgets]
queries_per_question = 4
fetches_per_question = 5
questions_per_night = 8
fetches_per_night = 40

[search]
engine = "ddg"                  # "ddg" (no key) or "searxng" (self-hosted)
searxng_url = "http://localhost:8888"
fetch_backend = "jina"          # "jina" (r.jina.ai, no key, renders JS) or "trafilatura"
jina_base = "https://r.jina.ai/"

[lint]
stale_days = 30
contradiction_days = 14

[extract]
# For `wiki drop` of PDFs/images (needs the optional [docs] extra).
ocr = true                 # allow Tesseract OCR for flat images
tesseract_cmd = ""         # path to tesseract.exe on Windows, or "" to use PATH
docling_ocr = true         # let Docling OCR scanned PDFs
whisper_model = "base"     # local ASR model size (only if the [whisper] extra is installed)

[embed]
# Local-embedding semantic search (needs the optional [semantic] extra: torch).
model = "sentence-transformers/all-MiniLM-L6-v2"
enabled = false

[mcp]
# Expose the brain over MCP so any client (Claude Desktop, other harnesses) can
# query it (needs the optional [mcp] extra). `wiki mcp info` prints the client
# config snippet; `wiki mcp serve` runs the stdio server. No API key, no model
# call — the server only wraps the read tools, plus the gated capture write.
read_only = false          # true: serve read-only (omit the brain_capture write tool)
recall_k = 8               # default top-k claims returned by brain_recall

[retrieval]
# Which retrieval backend serves recall (LEDGER_SPEC.md §8). The backend returns
# *candidates* — ids and scores. WikiBrain then re-reads status, scope and
# confidence from the ledger and applies the trust filter, so a backend can
# degrade recall quality but can never widen trust.
#
# Only `sqlite_fts` ships today (FTS5 + optional local-embedding hybrid via the
# [semantic] extra). `graphiti`, `cognee`, `qdrant`, `chroma` and `llamaindex`
# are the planned adapters — naming one now fails loudly rather than silently
# falling back and quietly changing what recall means.
backend = "sqlite_fts"
profile = "manager_brief"  # default recall profile (see LEDGER_SPEC.md §7)
max_items = 8              # default bound on a RecallPack
# Candidates to fetch per requested item. Trust/scope filtering runs AFTER
# retrieval, so the backend must over-fetch or a bounded pack comes back short.
overfetch = 4

[librarian]
# The librarian is the model-BEARING half — the `wiki-librarian` console script,
# a SEPARATE process from `wiki` (which still makes zero model calls). It performs
# the extraction judgment a Claude Code session would, using whatever model you
# point it at. It never promotes: everything it files is pending, behind the same
# human gate. Leave this table out entirely and nothing changes — extraction just
# happens in interactive sessions as before.
#
# Trigger model: EVENT-DRIVEN, not scheduled. With auto_extract on, each `wiki
# add/drop/capture/transcribe` fires a detached `wiki-librarian extract` for the
# new source, so a clip is extracted seconds after it lands — no cron, no Task
# Scheduler, no Desktop Routines. `wiki-librarian catch-up` drains any backlog
# (machine was off, model was down); run it by hand, or from a timer if you like
# belt-and-suspenders. If the librarian is unreachable, sources just stay 'new'.
auto_extract = false

# Any OpenAI-compatible /v1 endpoint. Local + key-free options keep the project's
# original posture: Ollama ("http://localhost:11434/v1") or LM Studio
# ("http://localhost:1234/v1"). Hosted options (OpenRouter, DeepSeek, OpenAI,
# Anthropic's compat endpoint) also work — set api_key_env for those.
base_url = "http://localhost:11434/v1"

# The API key is NEVER stored here (that would trip `wiki lint`'s secret scan).
# Give the NAME of an environment variable that holds it; "" means no key (local).
api_key_env = ""                 # e.g. "OPENROUTER_API_KEY"

# Default model for every task. Per-task overrides go under [librarian.models]:
# cheap/local for the high-volume extraction + triage, a stronger model for
# adjudication and synthesis. Any task without an override uses this default.
model = "qwen3:14b"

# [librarian.models]
# extract    = "qwen3:14b"                  # high volume — keep it cheap/local
# triage     = "qwen3:14b"                  # per-claim promote/reject/hold recommendation
# adjudicate = "claude-sonnet-5"            # contradictions/escalations — lowest volume, hardest
# synthesize = "claude-sonnet-5"            # page prose + skill drafts

# --- Example: a REMOTE OpenAI-compatible GATEWAY (llama-swap / LiteLLM /
# fleet-router on another machine) fronting several GGUF models, with per-task
# routing. The librarian treats it exactly like a hosted API: point base_url at
# the box's address (NOT 127.0.0.1 — the gateway must be bound/exposed on the LAN,
# behind a firewall or reverse proxy) and authenticate with a token via
# api_key_env. Reasoning models (e.g. Ornith) need generous max_tokens (below) and
# emit a <think> preamble the librarian strips automatically.
# base_url    = "http://inferencebox.lan:4000/v1"   # a remote LiteLLM gateway
# api_key_env = "INFERENCEBOX_TOKEN"                # LiteLLM master key, from the env
# [librarian.models]
# extract    = "qwen2.5-coder-14b"          # reliable structured-JSON extraction
# triage     = "ornith-1.0-9b"              # fast per-claim reasoning
# adjudicate = "ornith-1.0-35b"             # hardest judgement, lowest volume
# synthesize = "ornith-1.0-35b"             # prose + skill drafts
# (Or point base_url at a router and set model = "auto" to let it classify.)

# --- Example: RUN ENTIRELY ON CPU — no GPU, no API, no key, no monthly bill.
# WikiBrain is designed to be whole without calling out to a paid/remote API.
# The `wiki` CLI is already 100% deterministic; the librarian is the only
# model-bearing half, and two things keep a small local CPU model sufficient:
#   1. a pure-code pre-filter resolves the clear triage/contradiction cases, so
#      the model is only asked about the genuinely ambiguous ones (see below);
#   2. json_schema = true forces schema-valid JSON on the first pass, so a small
#      model is reliable without a retry loop.
# Point base_url at a local llama.cpp/Ollama server on the SAME box (no LAN, no
# firewall to think about). July-2026 CPU picks: Qwen3.5 4B (or 9B) for the
# high-volume extract/triage; on a high-RAM box a small-active MoE (e.g. a
# 35B-A3B — 35B weights but only ~3B active per token) gives near-large-model
# adjudication at CPU-friendly speed. See README "Run entirely on CPU".
# base_url    = "http://localhost:8080/v1"   # llama.cpp `-m qwen3.5-4b.gguf --host 0.0.0.0`
# api_key_env = ""                            # local server, no key
# model       = "qwen3.5:4b"
# [librarian.models]
# extract    = "qwen3.5:4b"                  # high volume — small + grammar-constrained
# triage     = "qwen3.5:4b"                  # most cases resolved in pure code first
# adjudicate = "qwen3.5:35b-a3b"             # MoE: large quality, ~3B active (high-RAM box)
# synthesize = "qwen3.5:35b-a3b"             # prose + skill drafts
# json_schema = true                          # grammar-constrained JSON (default on)

max_source_chars = 24000         # truncate raw source text sent to the model
timeout = 180                    # seconds per model call
temperature = 0.2
retries = 1                      # re-ask attempts when output fails the contract
network_retries = 2              # transient (connection/5xx) retries w/ backoff
# Output token cap per call (sent as max_tokens; 0 omits it). Reasoning models
# spend tokens thinking before the JSON, so keep this >= ~2048 for them.
max_tokens = 4096

# Grammar-constrained decoding: send each pass's JSON schema as `response_format:
# json_schema` so the server can only emit schema-valid JSON on the first pass.
# This is what makes a SMALL local CPU model reliable (the parse/retry loop
# mostly disappears). Auto-degrades: a server that rejects the param falls back
# to json_object, then plain — safe to leave on. Honored by llama.cpp, vLLM,
# SGLang (xgrammar), OpenAI.
json_schema = true

# --- memory safety (docs/SAFETY.md) -----------------------------------------
# WikiBrain owns the POLICY: when memory is scanned, and what happens when
# something is found. Detection is delegated to modular engines, and the good
# ones are maintained by other people.
#
# `trusted` and `safe` are independent. Promotion decides authority; safety
# decides exposure. A promoted claim carrying an API key is trusted and unsafe,
# and it comes back from recall with the key masked.
#
# Enforced surfaces: memory_candidate (capture), memory_recall (read),
# memory_promotion (the human gate). Source ingest and Obsidian projection are
# specified as future work and are not scanned.
[safety]
enabled = true                   # false disables scanning entirely (not recommended)
max_text_chars = 200000          # truncate before scanning; a claim is not a file

# `enabled` and `available` are different questions. An engine that is enabled but
# whose dependency is missing reports `unavailable` — never "found nothing". If it
# is also `required`, the content is treated as unscanned, and unscanned is not
# clean: promotion blocks and recall withholds. Set `required = true` only for
# engines you have actually installed.

# Built-in, pure stdlib, always available. Deliberately limited: obvious secrets,
# obvious injection phrases, basic unsafe tool directives, suspicious encoded
# blobs. It is a floor, not a product. Cannot be disabled while safety is enabled.
[safety.engines.baseline]
enabled = true
required = true

# Yelp detect-secrets. Pure Python, no subprocess: `pip install wiki-brain[safety-secrets]`.
# The first engine worth enabling — entropy detection and a maintained plugin set.
# Inert (and harmless) when the package is absent.
[safety.engines.detect_secrets]
enabled = true
required = false

# TruffleHog. A separately-installed executable, not a pip package.
# Runs only where the policy asks for whole-file scanning — promotion — never on
# the recall path. `allow_network_verification` makes TruffleHog authenticate a
# candidate credential against its real service to check whether it still works.
# That mails the secret to a third party. Leave it off.
[safety.engines.trufflehog]
enabled = false
required = false
# executable = "trufflehog"
# timeout_seconds = 20.0
# allow_network_verification = false

# Gitleaks. An alternative to TruffleHog, not a companion — enabling both doubles
# the subprocess cost on every promotion for a thin margin. Pick one.
[safety.engines.gitleaks]
enabled = false
required = false
# executable = "gitleaks"
# timeout_seconds = 20.0

# Microsoft Presidio. The preferred PII engine: `pip install wiki-brain[safety-pii]`,
# then `python -m spacy download en_core_web_lg`. WikiBrain will not build a PII
# platform; the baseline finds an email and a card and nothing else.
[safety.engines.presidio]
enabled = false
required = false
# score_threshold = 0.5

# A maintained local prompt-injection classifier: `pip install wiki-brain[safety-injection]`.
# Defaults to protectai/deberta-v3-base-prompt-injection-v2 (Apache-2.0, ungated).
# Point `model` at meta-llama/Llama-Prompt-Guard-2-86M if you have accepted its
# licence. Pin `revision` to a commit: a classifier that silently changes its
# weights changes what WikiBrain withholds. It reports `unavailable` rather than
# downloading, unless `allow_download` is set — a recall must never become a
# network call. This layer raises attacker cost; it is not an authority.
[safety.engines.prompt_guard]
enabled = false
required = false
# model = "protectai/deberta-v3-base-prompt-injection-v2"
# revision = ""                  # pin me
# threshold = 0.5
# allow_download = false
